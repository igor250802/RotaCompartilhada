<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Compartilhada - Painel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --sidebar-width: 280px; --primary: #0d6efd; --dark: #212529; }
        body { background-color: #f4f7f6; min-height: 100vh; }

        .sidebar {
            width: var(--sidebar-width); height: 100vh; position: fixed;
            background-color: var(--dark); color: white; z-index: 1000;
        }

        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #444; }
        .sidebar-header h4 { color: var(--primary); font-weight: bold; margin: 0; }

        .nav-link {
            color: #adb5bd; padding: 15px 25px; display: flex;
            align-items: center; gap: 10px; transition: 0.2s; cursor: pointer;
        }

        .nav-link:hover, .nav-link.active { background-color: #343a40; color: white; }

        .main-content {
            margin-left: var(--sidebar-width); padding: 40px;
            width: calc(100% - var(--sidebar-width));
        }

        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h4>Rota Sul</h4>
            <div id="user-info" class="small text-muted mt-2"></div>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link active" onclick="showSection('resumo')">
                <i class="material-icons">dashboard</i> Resumo
            </a>
            <a class="nav-link" onclick="showSection('veiculos')">
                <i class="material-icons">directions_car</i> Meus Veículos
            </a>
            <a class="nav-link" onclick="showSection('caronas')">
                <i class="material-icons">map</i> Minhas Caronas
            </a>
            <hr class="mx-3 text-secondary">
            <a class="nav-link text-danger" onclick="logout()">
                <i class="material-icons">logout</i> Sair
            </a>
        </nav>
    </div>

    <div class="main-content">
        
        <div id="section-resumo" class="section-content active">
            <h2 id="welcome-msg">Bem-vindo!</h2>
            <p class="text-muted">O que deseja fazer hoje?</p>
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card card-custom p-4 text-center">
                        <i class="material-icons text-primary mb-2" style="font-size: 48px;">add_location</i>
                        <h5>Oferecer Carona</h5>
                        <button class="btn btn-primary btn-sm mt-2" onclick="showSection('caronas')">Criar Rota</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-veiculos" class="section-content">
            <div class="card card-custom p-4">
                <h3>Meus Veículos</h3>
                <form id="formVeiculo" class="row g-3 mt-2">
                    <div class="col-md-4">
                        <label class="form-label">Modelo</label>
                        <input type="text" id="v-modelo" class="form-control" placeholder="Ex: Corolla" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Placa</label>
                        <input type="text" id="v-placa" class="form-control" placeholder="ABC-1234" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cor</label>
                        <input type="text" id="v-cor" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Ano</label>
                        <input type="number" id="v-ano" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Cadastrar Veículo</button>
                    </div>
                </form>
                <hr>
                <div id="lista-veiculos" class="mt-3">
                    </div>
            </div>
        </div>

        <div id="section-caronas" class="section-content">
            <h3>Minhas Caronas</h3>
            <p>Gerencie suas rotas e horários.</p>
            </div>

        <div id="mensagem" class="mt-4 text-center fw-bold"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        
        // 1. Verificação de Segurança (Session)
        const usuario = JSON.parse(sessionStorage.getItem('usuarioLogado'));
        if (!usuario) {
            window.location.href = "index.html";
        } else {
            document.getElementById('user-info').innerText = usuario.email;
            document.getElementById('welcome-msg').innerText = `Olá, ${usuario.nome}!`;
        }

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(id === 'veiculos') carregarVeiculos();
        }

        // --- CADASTRO DE VEÍCULO (RF03) ---
        document.getElementById('formVeiculo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                modelo: document.getElementById('v-modelo').value,
                placa: document.getElementById('v-placa').value,
                cor: document.getElementById('v-cor').value,
                ano: parseInt(document.getElementById('v-ano').value),
                id_proprietario: usuario.id_usuario
            };

            const response = await fetch(`${API_URL}/vehicles/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                alert("Veículo cadastrado!");
                document.getElementById('formVeiculo').reset();
                carregarVeiculos();
            }
        });

        // --- LISTAR VEÍCULOS ---
        async function carregarVeiculos() {
            const res = await fetch(`${API_URL}/vehicles/user/${usuario.id_usuario}`);
            const veiculos = await res.json();
            const container = document.getElementById('lista-veiculos');
            
            if(veiculos.length === 0) {
                container.innerHTML = "<p class='text-muted'>Nenhum veículo cadastrado.</p>";
                return;
            }

            container.innerHTML = veiculos.map(v => `
                <div class="d-flex justify-content-between align-items-center p-3 mb-2 bg-white rounded border">
                    <span><strong>${v.modelo}</strong> - ${v.placa} (${v.cor})</span>
                    <button class="btn btn-outline-danger btn-sm" onclick="deletarVeiculo(${v.id_veiculo})">Excluir</button>
                </div>
            `).join('');
        }

        async function deletarVeiculo(id) {
            if(confirm("Deseja excluir este veículo?")) {
                await fetch(`${API_URL}/vehicles/${id}`, { method: 'DELETE' });
                carregarVeiculos();
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
