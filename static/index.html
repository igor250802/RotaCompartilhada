<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota 99 - Entrar ou Cadastrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --chumbo-dark: #1a1a1a;
            --chumbo-med: #2c3e50;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
        }

        /* Sidebar similar ao Dashboard */
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: var(--chumbo-dark);
            color: white;
            position: fixed;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .brand { font-size: 1.5rem; font-weight: 600; margin-bottom: 40px; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 8px;
            color: #bdc3c7;
            text-decoration: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item i { margin-right: 15px; }
        .nav-item:hover, .nav-item.active { background-color: var(--chumbo-med); color: white; }

        /* Área de Conteúdo */
        .main-content {
            margin-left: 280px;
            padding: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            display: none; /* Escondido por padrão */
        }

        .auth-card.active { display: block; }

        h2 { margin-top: 0; color: var(--chumbo-dark); }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 25px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-99 {
            width: 100%;
            padding: 14px;
            background-color: var(--chumbo-dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-99:hover { background-color: #333; }

        /* Estilo para busca pública */
        .ride-mini-card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">Rota 99</div>
        <nav>
            <div class="nav-item active" id="btn-login" onclick="switchTab('login')">
                <i class="material-icons">login</i> Entrar
            </div>
            <div class="nav-item" id="btn-cadastro" onclick="switchTab('cadastro')">
                <i class="material-icons">person_add</i> Criar Conta
            </div>
            <div class="nav-item" id="btn-explorar" onclick="switchTab('explorar')">
                <i class="material-icons">search</i> Ver Caronas
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="section-login" class="auth-card active">
            <h2>Bem-vindo de volta</h2>
            <p>Acesse sua conta para reservar sua próxima carona.</p>
            <form id="formLogin">
                <label>E-mail</label>
                <input type="email" id="login-email" placeholder="exemplo@email.com" required>
                <label>Senha</label>
                <input type="password" id="login-senha" placeholder="••••••••" required>
                <button type="submit" class="btn-99">Entrar</button>
            </form>
        </div>

        <div id="section-cadastro" class="auth-card">
            <h2>Criar nova conta</h2>
            <p>Junte-se à maior rede de caronas do Sul de Minas.</p>
            <form id="formCadastro">
                <label>Nome Completo</label>
                <input type="text" id="cad-nome" placeholder="Seu nome" required>
                <label>E-mail</label>
                <input type="email" id="cad-email" placeholder="seu@email.com" required>
                <label>Telefone</label>
                <input type="text" id="cad-tel" placeholder="(35) 99999-9999">
                <label>Senha</label>
                <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required>
                <button type="submit" class="btn-99">Cadastrar</button>
            </form>
        </div>

        <div id="section-explorar" class="auth-card" style="max-width: 600px;">
            <h2>Explorar Caronas</h2>
            <p>Veja as viagens disponíveis agora mesmo.</p>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="busca-publica" placeholder="Para onde você vai?" style="margin-bottom:0">
                <button class="btn-99" style="width:120px" onclick="pesquisarPublico()">Buscar</button>
            </div>
            <div id="lista-publica"></div>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:8000";

        function switchTab(tab) {
            document.querySelectorAll('.auth-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById('section-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // Login integrado com sessionStorage (como no seu original)
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (res.ok) {
                    const data = await res.json();
                    // IMPORTANTE: dashboard.html usará esta chave 'usuario'
                    localStorage.setItem('usuario', JSON.stringify(data));
                    window.location.href = "dashboard.html";
                } else {
                    alert("E-mail ou senha incorretos.");
                }
            } catch (err) {
                alert("Erro ao conectar ao servidor.");
            }
        });

        // Cadastro integrado com seu users.py
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('cad-nome').value,
                email: document.getElementById('cad-email').value,
                telefone: document.getElementById('cad-tel').value,
                senha: document.getElementById('cad-senha').value
            };

            const res = await fetch(`${API_URL}/users/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (res.ok) {
                alert("Cadastro realizado! Agora faça seu login.");
                switchTab('login');
            } else {
                alert("Erro ao cadastrar usuário.");
            }
        });

        // Busca pública de caronas (sem precisar estar logado)
        async function pesquisarPublico() {
            const destino = document.getElementById('busca-publica').value;
            if(!destino) return;
            const res = await fetch(`${API_URL}/rides/search/${destino}`);
            const caronas = await res.json();
            const container = document.getElementById('lista-publica');
            
            container.innerHTML = caronas.map(c => `
                <div class="ride-mini-card">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${destino}</strong>
                        <span style="color:var(--chumbo-med); font-weight:600">${c.vagas_totais} vagas</span>
                    </div>
                    <div style="font-size:0.8rem; color:#7f8c8d; margin-top:5px">
                        ${new Date(c.data_hora).toLocaleString()}
                    </div>
                    <div style="margin-top:10px; font-size:0.8rem; color:blue; cursor:pointer" onclick="switchTab('login')">
                        Faça login para reservar →
                    </div>
                </div>
            `).join('') || '<p>Nenhuma carona encontrada.</p>';
        }
    </script>
</body>
</html>
